server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version (reduces information disclosure)
    server_tokens off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # Note: 'unsafe-inline' required by MUI/Emotion CSS-in-JS runtime style injection.
    # HSTS should be set by the upstream reverse proxy (TLS termination) rather than here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Same-origin API proxy: browser calls /api/v1/... on this host; nginx forwards to backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend allows uploads up to 50 MB (max_upload_size_bytes in config.py)
        client_max_body_size 50m;

        # Timeouts for long LLM / export requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA routing: all paths serve index.html (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite builds with content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        return 404;
    }
}
