site_name: Datenschutzagent Docs
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: purple
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

nav:
  - Start:
    - Einführung: index.md
    - Schnellstart: schnellstart.md

  - Benutzerhandbuch:
    - Vorgänge: benutzerhandbuch/vorgaenge.md
    - Dokumente: benutzerhandbuch/dokumente.md
    - Playbooks: benutzerhandbuch/playbooks.md
    - Playbook-Checks: benutzerhandbuch/playbook-checks.md
    - Findings und Status: benutzerhandbuch/findings-status.md
    - VVT-Normalisierung: benutzerhandbuch/vvt-normalisierung.md
    - DSB-Report: benutzerhandbuch/dsb-report.md
    - Annotierte Dokumente: benutzerhandbuch/annotierte-dokumente.md
    - Mein Profil: benutzerhandbuch/profil.md
    - Org-Profile: benutzerhandbuch/org-profile.md

  - Datenschutz-Konzepte:
    - Überblick: konzepte/datenschutz-ubersicht.md

  - Administration:
    - Verwaltung: administration/verwaltung.md
    - Authentifizierung (OIDC): administration/auth.md
    - Rollen (RBAC): administration/rollen.md
    - CLI: administration/cli.md
    - Datenbank-Migrationen: administration/migrationen.md

  - Konfiguration: konfiguration.md

  - Referenz:
    - API: referenz/api.md
    - Erweiterte API-Endpoints: referenz/api-erweitert.md
    - Architektur: referenz/architecture.md
    - Frontend-Architektur: referenz/frontend-architektur.md

  - Entwicklung:
    - Developer Guide: entwicklung/developer-guide.md

  - Projekt:
    - Roadmap: projekt/roadmap.md
    - Requirements & Gap-Analyse: projekt/requirements_gap.md
    - Nächste Schritte: projekt/next_steps.md
    - Sprint-Plan: projekt/sprint_plan.md

  - Support:
    - Troubleshooting & FAQ: support/troubleshooting.md

  - Rechtliches:
    - Lizenzen & Danksagungen: rechtliches/attributions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
