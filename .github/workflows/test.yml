name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datenschutzagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/datenschutzagent_test
      OLLAMA_ENABLED: "false"
      APP_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: backend
      # Lint & format gates — same tools/versions as .pre-commit-config.yaml, enforced in CI.
      - name: Ruff lint
        run: pip install ruff==0.11.4 && ruff check .
        working-directory: backend
      - name: Black format check
        run: pip install black==25.1.0 && black --check .
        working-directory: backend
      - name: Tests (with coverage)
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
        working-directory: backend
      # Quality gate: offline extraction/grounding evals (no LLM provider needed). Exits non-zero
      # when any evaluator's mean score falls below its threshold (see evals/run.py).
      - run: python -m evals.run
        working-directory: backend
