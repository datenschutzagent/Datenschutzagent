name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test
      - name: Check API type drift
        run: |
          npm run generate:api
          git diff --exit-code src/app/lib/api/schema.ts

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datenschutzagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/datenschutzagent_test
      OLLAMA_ENABLED: "false"
      APP_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Check OpenAPI schema drift
        run: |
          python export_schema.py 2>/dev/null > /tmp/openapi_current.json
          diff ../openapi.json /tmp/openapi_current.json
        working-directory: backend
      # Lint & format gates — same tools/versions as .pre-commit-config.yaml, enforced in CI.
      - name: Ruff lint
        run: pip install ruff==0.11.4 && ruff check .
        working-directory: backend
      - name: Black format check
        run: pip install black==25.1.0 && black --check .
        working-directory: backend
      - name: Tests (with coverage)
        # Coverage gate: CI fails below the threshold. Aktuell ~58 % (Issue #83);
        # bewusst knapp darunter als Regressionsschutz, schrittweise Richtung 75 % anheben.
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=55
        working-directory: backend
      # Quality gate: offline extraction/grounding evals (no LLM provider needed). Exits non-zero
      # when any evaluator's mean score falls below its threshold (see evals/run.py).
      - run: python -m evals.run
        working-directory: backend

  e2e:
    # Playwright smoke tests against the full Docker stack (issue #83).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      # Throwaway secrets for CI only; APP_ENVIRONMENT=test does NOT force OIDC,
      # so the app runs in single-user dev mode (no login) as the E2E tests expect.
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          APP_ENVIRONMENT=test
          POSTGRES_USER=datenschutzagent
          POSTGRES_PASSWORD=ci_pw
          POSTGRES_DB=datenschutzagent
          DATABASE_URL=postgresql+asyncpg://datenschutzagent:ci_pw@postgres:5432/datenschutzagent
          REDIS_PASSWORD=ci_redis
          WEAVIATE_API_KEY=ci_weaviate
          MINIO_ROOT_USER=ciminio
          MINIO_ROOT_PASSWORD=ciminiopw123
          # Default user needs edit rights so the "Neuer Vorgang" button renders
          # (canEdit → editor/admin); without this the role defaults to viewer.
          RBAC_DEFAULT_ROLE=admin
          OLLAMA_ENABLED=false
          CELERY_ENABLED=false
          WEAVIATE_INDEXING_ENABLED=false
          CORS_ORIGINS=http://localhost:3002
          EOF
      - name: Start stack
        # --wait blocks until healthchecks pass (postgres, redis, weaviate, backend).
        # The backend applies Alembic migrations on startup (entrypoint.sh).
        run: docker compose up -d --build --wait
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Wait for frontend
        # The frontend container has no healthcheck; poll nginx on port 3002.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3002 >/dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 3
          done
          echo "frontend did not become ready" >&2; exit 1
      - name: Run Playwright smoke tests
        run: npx playwright test --grep @smoke
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3002
      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
