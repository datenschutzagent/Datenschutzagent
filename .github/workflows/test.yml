name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datenschutzagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/datenschutzagent_test
      OLLAMA_ENABLED: "false"
      APP_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: backend
      # Lint & format gates — same tools/versions as .pre-commit-config.yaml, enforced in CI.
      - name: Ruff lint
        run: pip install ruff==0.11.4 && ruff check .
        working-directory: backend
      - name: Black format check
        run: pip install black==25.1.0 && black --check .
        working-directory: backend
      - name: Tests (with coverage)
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
        working-directory: backend
      # Quality gate: offline extraction/grounding evals (no LLM provider needed). Exits non-zero
      # when any evaluator's mean score falls below its threshold (see evals/run.py).
      - run: python -m evals.run
        working-directory: backend
