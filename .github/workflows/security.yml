name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Monday 04:00 UTC – catches newly-disclosed CVEs
    - cron: '0 4 * * 1'

jobs:
  python-sast:
    name: Python SAST (Bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: pip-audit – CVE check
        # Fails on ANY known vulnerability in the resolved dependency tree.
        # (pip-audit has no severity filter; the previously used
        # --fail-on-vuln-severity flag does not exist and broke the job.)
        run: pip-audit -r backend/requirements.txt

      - name: Bandit – Python SAST
        # Medium+ severity; skip B101 (assert in tests), B110 (try-except-pass — reviewed),
        # B608 (string-built SQL — reviewed 2026-06: all raw queries interpolate only
        # hardcoded filter fragments and bind values via :params; SQL injection coverage
        # remains via the Semgrep job, p/owasp-top-ten).
        run: |
          bandit -r backend/app/ \
            --severity-level medium \
            --skip B101,B110,B608 \
            --format json \
            --output bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  frontend-security:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit – HIGH/CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  semgrep:
    name: Semgrep SAST (OWASP Top 10 + Secrets)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config=p/python \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --json \
            --output semgrep-report.json \
            backend/app/

      - name: Upload Semgrep report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  container-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build backend image for scanning
        run: docker build -t datenschutzagent-backend:scan backend/

      - name: Trivy – gate on fixable HIGH/CRITICAL
        # This is the actual gate. It must use a non-SARIF format: with format=sarif the
        # action drops the severity filter ("Building SARIF report with all severities"),
        # so an exit-code there would fire on ANY severity. Table output also makes a red
        # gate diagnosable directly from the job log.
        # ignore-unfixed: unfixed base-image CVEs are not actionable and made the gate
        # permanently red — remaining failures always mean an available fix exists.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: 'datenschutzagent-backend:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: 'true'
          trivyignores: '.trivyignore'

      - name: Trivy – SARIF upload (non-gating)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: 'datenschutzagent-backend:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: 'true'
          trivyignores: '.trivyignore'
          skip-setup-trivy: 'true'  # already set up by the gate step above

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  secret-scan:
    name: Secret Detection (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for detect-secrets baseline comparison

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files '\.secrets\.baseline$' \
            > .secrets.scan-result.json

      - name: Check for new secrets
        run: |
          # If baseline exists, compare; otherwise just report
          if [ -f .secrets.baseline ]; then
            detect-secrets audit .secrets.baseline
          else
            echo "No baseline found — review .secrets.scan-result.json"
            cat .secrets.scan-result.json
          fi

      - name: Upload secrets report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: secrets-scan-report
          path: .secrets.scan-result.json

  sbom:
    name: SBOM (CycloneDX – Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Backend SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements backend/requirements.txt -o sbom-backend.json

      - name: Frontend SBOM (CycloneDX)
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom-frontend.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-frontend.json
