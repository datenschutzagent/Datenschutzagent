# Datenschutzagent – Postgres, MinIO, Redis, Backend, Frontend
# Ollama wird extern betrieben (z. B. im lokalen Netz) und über .env konfiguriert.
# Run: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER must be set in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-datenschutzagent}"
    # Kein ports: nur im Docker-Netz für Backend erreichbar (postgres:5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-datenschutzagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}"
    # Kein ports: nur im Docker-Netz für Backend erreichbar (minio:9000)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Kein ports: nur im Docker-Netz für Backend/Celery erreichbar (redis:6379)
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.4
    # Kein ports: nur im Docker-Netz für Backend erreichbar (weaviate:8080)
    environment:
      DEFAULT_VECTORIZER_MODULE: "none"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEY:?WEAVIATE_API_KEY must be set in .env}"
      AUTHENTICATION_APIKEY_USERS: "datenschutzagent"
      PERSISTENCE_DATA_PATH: "${WEAVIATE_PERSISTENCE_DATA_PATH:-/var/lib/weaviate}"
      QUERY_DEFAULTS_LIMIT: "${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}"
      CLUSTER_HOSTNAME: "${WEAVIATE_CLUSTER_HOSTNAME:-node1}"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      # Hostname "postgres" = Service-Name im Docker-Netz (nicht localhost)
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set in .env}"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0"
      # APP_ENVIRONMENT: development | test | production
      # In production werden OIDC, HTTPS-CORS und Webhook-Encryption zwingend erzwungen.
      APP_ENVIRONMENT: "${APP_ENVIRONMENT:-development}"
      # CORS: In production set CORS_ORIGINS in .env to your exact HTTPS frontend origin.
      # Default is localhost-only for local development.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3002,http://127.0.0.1:3002,http://localhost:5173,http://127.0.0.1:5173}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
      WEAVIATE_URL: "${WEAVIATE_URL:-http://weaviate:8080}"
      WEAVIATE_INDEXING_ENABLED: "${WEAVIATE_INDEXING_ENABLED:-false}"
    extra_hosts:
      # Ollama auf dem Host erreichbar (z. B. OLLAMA_BASE_URL=http://host.docker.internal:11434)
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set in .env}"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0"
      APP_ENVIRONMENT: "${APP_ENVIRONMENT:-development}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    command: celery -A app.celery_app worker -l info -Q extraction,celery
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  redis_data:
  weaviate_data:
  backend_storage:
