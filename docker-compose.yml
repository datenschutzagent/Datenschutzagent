# Datenschutzagent – Postgres, MinIO, Redis, Backend, Frontend
# Ollama wird extern betrieben (z. B. im lokalen Netz) und über .env konfiguriert.
# Run: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datenschutzagent
    # Kein ports: nur im Docker-Netz für Backend erreichbar (postgres:5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.4
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DEFAULT_VECTORIZER_MODULE: "none"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "${WEAVIATE_PERSISTENCE_DATA_PATH:-/var/lib/weaviate}"
      QUERY_DEFAULTS_LIMIT: "${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}"
      CLUSTER_HOSTNAME: "${WEAVIATE_CLUSTER_HOSTNAME:-node1}"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      # Hostname "postgres" = Service-Name im Docker-Netz (nicht localhost)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/datenschutzagent
      CELERY_BROKER_URL: redis://redis:6379/0
      # CORS: Zugriff vom Browser aus dem LAN (z. B. http://192.168.1.20:3001) erlauben.
      # Überschreibbar per .env: CORS_ORIGINS=http://...
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3002,http://127.0.0.1:3002,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.20:3002,http://192.168.1.20:3001,http://192.168.1.20:5173}"
      WEAVIATE_URL: "${WEAVIATE_URL:-http://weaviate:8080}"
      WEAVIATE_INDEXING_ENABLED: "${WEAVIATE_INDEXING_ENABLED:-false}"
    extra_hosts:
      # Ollama auf dem Host erreichbar (z. B. OLLAMA_BASE_URL=http://host.docker.internal:11434)
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    restart: on-failure

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/datenschutzagent
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    command: celery -A app.celery_app worker -l info -Q extraction,celery
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8002}
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
  weaviate_data:
  backend_storage:
