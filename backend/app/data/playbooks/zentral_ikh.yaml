name: "Datenschutz-Vorprüfung IKH"
version: "1.0"
department: "IKH – Interdisziplinäres Kolleg Hochschuldidaktik"
case_type: "Allgemein"

checks:
  - name: "Rechtmäßigkeit der Verarbeitung"
    instruction: "Prüfe, ob eine Rechtsgrundlage für die Verarbeitung personenbezogener Daten angegeben ist."
    type: document
    category: "Rechtmäßigkeit"
    mandatory: true
  - name: "Zweckbindung"
    instruction: "Prüfe, ob der Verarbeitungszweck eindeutig und bestimmt beschrieben ist."
    type: document
    category: "Zweck"
    mandatory: true
  - name: "Dokumentation und Löschfristen"
    instruction: "Prüfe, ob die Verarbeitung dokumentiert ist und Lösch- bzw. Aufbewahrungsfristen festgelegt sind."
    type: document
    category: "Rechenschaftspflicht"
    mandatory: false
