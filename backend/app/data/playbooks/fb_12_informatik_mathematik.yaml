name: "Datenschutz-Vorprüfung Informatik und Mathematik"
version: "1.0"
department: "FB 12 – Informatik und Mathematik"
case_type: "Forschungsvorhaben"

checks:
  - name: "Rechtmäßigkeit der Verarbeitung"
    instruction: "Prüfe, ob eine Rechtsgrundlage für die Verarbeitung personenbezogener Daten (z.B. in Datensätzen, Experimenten) angegeben ist."
    type: document
    category: "Rechtmäßigkeit"
    mandatory: true
  - name: "Technische und organisatorische Maßnahmen"
    instruction: "Prüfe, ob angemessene technische und organisatorische Maßnahmen zum Schutz personenbezogener Daten beschrieben sind."
    type: document
    category: "Sicherheit"
    mandatory: true
  - name: "Datenminimierung und Löschung"
    instruction: "Prüfe, ob das Prinzip der Datenminimierung beachtet wird und Lösch- bzw. Anonymisierungsfristen festgelegt sind."
    type: document
    category: "Speicherbegrenzung"
    mandatory: false
