name: "Datenschutz-Vorprüfung Sprach- und Kulturwissenschaften"
version: "1.0"
department: "FB 09 – Sprach- und Kulturwissenschaften"
case_type: "Forschungsvorhaben"

checks:
  - name: "Rechtmäßigkeit der Verarbeitung"
    instruction: "Prüfe, ob eine Rechtsgrundlage für die Verarbeitung personenbezogener Daten (z.B. bei Befragungen, Korpusdaten) angegeben ist."
    type: document
    category: "Rechtmäßigkeit"
    mandatory: true
  - name: "Zweckbindung"
    instruction: "Prüfe, ob der Verarbeitungszweck klar und bestimmt beschrieben ist."
    type: document
    category: "Zweck"
    mandatory: true
  - name: "Information der Betroffenen und Löschfristen"
    instruction: "Prüfe, ob die Betroffenen informiert werden und ob Lösch- bzw. Aufbewahrungsfristen festgelegt sind."
    type: document
    category: "Transparenz"
    mandatory: false

match:
  org_profiles:
    - "goethe"
