name: "Datenschutz-Vorprüfung Geowissenschaften / Geographie"
version: "1.0"
department: "FB 11 – Geowissenschaften / Geographie"
case_type: "Forschungsvorhaben"

checks:
  - name: "Rechtmäßigkeit der Verarbeitung"
    instruction: "Prüfe, ob eine Rechtsgrundlage für die Verarbeitung personenbezogener Daten (z.B. bei Geländeerhebungen, Befragungen) angegeben ist."
    type: document
    category: "Rechtmäßigkeit"
    mandatory: true
  - name: "Zweck und Datenminimierung"
    instruction: "Prüfe, ob der Verarbeitungszweck eindeutig ist und nur erforderliche personenbezogene Daten verarbeitet werden."
    type: document
    category: "Zweck"
    mandatory: true
  - name: "Geodaten und Personenbezug"
    instruction: "Prüfe, ob bei Nutzung von Geodaten mit Personenbezug die Erforderlichkeit und Rechtmäßigkeit dargelegt ist."
    type: document
    category: "Datenminimierung"
    mandatory: false
