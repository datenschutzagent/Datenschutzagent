# Beispielprofil mit strengeren Schwellenwerten und gewichteten Dimensionen.
# Demonstriert, wie eine Organisation das Standardverhalten anpassen kann.
version: 1

avv:
  # Strenger als Standard: Stufen früher hochgesetzt.
  level_thresholds:
    - { max_score: 1.2, level: low }
    - { max_score: 2.0, level: medium }
    - { max_score: 3.0, level: high }
    - { max_score: 5.0, level: critical }

  # Drittland und Sub-AV-Risiko stärker gewichten als andere Dimensionen.
  dimension_weights:
    data_sensitivity: 1.0
    access_scope: 1.0
    third_country: 1.5
    subprocessors: 1.3
    contractual_safeguards: 1.0

  min_confidence: 0.6

dsfa_screening:
  # Strengere Schwelle: DSFA bereits ab einem Faktor verpflichtend, aber
  # special_categories (Art. 9) hat doppeltes Gewicht — d.h. dieser Faktor
  # allein erfüllt die Pflicht.
  required_threshold: 1.0
  factors:
    - id: profiling
      label: "Profiling oder automatisierte Entscheidung"
      keywords_processing_context: [profil, scoring, automat, entscheid]
      keywords_title: [profil, scoring]
    - id: special_categories
      label: "Besondere Kategorien (Art. 9)"
      case_flag: special_category_data
      weight: 2.0
    - id: international_transfer
      label: "Internationaler Datentransfer"
      case_flag: international_transfer
    - id: critical_findings
      label: "Kritische Compliance-Befunde"
      findings_severity: [critical, high]

case_score:
  severity_weights:
    critical: 40
    high: 20
    medium: 8
    low: 1
    info: 0
  max_score: 100

maturity:
  # AVV und DSFA stärker gewichtet als andere Dimensionen.
  weights:
    vvt: 0.15
    dsfa: 0.25
    avv: 0.25
    tom: 0.20
    velocity: 0.15
  velocity:
    optimal_days: 7
    worst_days: 30

risk_velocity:
  enabled: true
  window_days: 60      # kürzeres Fenster für sensibleren Trend
  significant_change_pct: 10
