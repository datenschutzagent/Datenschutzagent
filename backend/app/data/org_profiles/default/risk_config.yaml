# Konfiguration der Risikomodelle für das Standard-Profil.
#
# Alle Sektionen und Felder sind optional. Fehlt eine Sektion oder ein Feld,
# greift der eingebaute Default — der in dieser Datei explizit dokumentiert ist
# (= bisheriges hartkodiertes Verhalten).
#
# Schema-Version. Aktuelle Implementierung erwartet 1.
version: 1

# -----------------------------------------------------------------------------
# AVV-Risiko (Art. 28 DSGVO) — backend/app/services/avv_risk_service.py
# -----------------------------------------------------------------------------
avv:
  # Mapping vom Durchschnitt der Dimensions-Scores (1-5) auf das Risiko-Level.
  # Die Liste muss nach max_score aufsteigend sortiert sein; der letzte Eintrag
  # ist Catch-All für alles darüber.
  level_thresholds:
    - { max_score: 1.5, level: low }
    - { max_score: 2.5, level: medium }
    - { max_score: 3.5, level: high }
    - { max_score: 5.0, level: critical }

  # Lineare Skalierung des Durchschnitts auf 0..100:
  # percent = (avg - score_min) / (score_max - score_min) * 100
  score_normalization:
    score_min: 1
    score_max: 5

  # Optional: Gewichtung einzelner Risiko-Dimensionen.
  # Wenn leer (Default), wird das arithmetische Mittel verwendet.
  dimension_weights: {}

  # Mindest-Konfidenz des LLM-Outputs (0..1). Unter dieser Schwelle wird das
  # Ergebnis in der API als low_confidence markiert. Defaultwert 0 = inaktiv.
  min_confidence: 0.0

# -----------------------------------------------------------------------------
# DSFA-Screening (EDSA-9-Faktoren-Test) — dsfa_service.py
# -----------------------------------------------------------------------------
dsfa_screening:
  # Gewichtete Mindestsumme, ab der eine DSFA gemäß Art. 35 DSGVO
  # verpflichtend ist. EDSA-Leitlinien empfehlen >= 2 (bei allen
  # Faktor-Gewichten = 1.0 entspricht das 2 erfüllten Faktoren).
  required_threshold: 2.0
  # 9-Faktoren-Test gemäß EDSA-Leitlinien. Jeder Faktor matcht, wenn eine
  # seiner Bedingungen erfüllt ist:
  #   case_flag                       — Attribut auf CaseModel ist truthy
  #   keywords_processing_context     — Substring in case.processing_context
  #   keywords_title                  — Substring in case.title
  #   findings_severity               — offenes Finding mit dieser Severity
  # Faktoren ohne weight verwenden 1.0.
  factors:
    - id: profiling
      label: "Profiling oder automatisierte Entscheidung"
      description: "Systematische und umfassende Bewertung persönlicher Aspekte durch automatisierte Verarbeitung (Art. 35 Abs. 3 lit. a)."
      keywords_processing_context: [profil, scoring, automat, entscheid]
      keywords_title: [profil, scoring]
    - id: special_categories
      label: "Besondere Kategorien personenbezogener Daten (Art. 9)"
      description: "Verarbeitung von Gesundheitsdaten, biometrischen Daten, Daten zur Herkunft etc."
      case_flag: special_category_data
    - id: large_scale
      label: "Umfangreiche Verarbeitung"
      description: "Verarbeitung personenbezogener Daten in großem Umfang (viele Betroffene oder große Datenmenge)."
      keywords_processing_context: [massendaten, großmaßst, umfangreich, viele betroffene, large scale]
    - id: international_transfer
      label: "Internationaler Datentransfer"
      description: "Übermittlung in Drittländer ohne angemessenes Schutzniveau."
      case_flag: international_transfer
    - id: vulnerable_subjects
      label: "Schutzbedürftige Betroffene"
      description: "Kinder, Patienten, Mitarbeiter oder andere schutzbedürftige Personengruppen."
      keywords_processing_context: [kind, patient, mitarbeiter, employee, schüler, student, vulnerable]
    - id: systematic_monitoring
      label: "Systematische Überwachung"
      description: "Überwachung öffentlich zugänglicher Bereiche oder systematische Beobachtung."
      keywords_processing_context: [überwach, kamera, tracking, monitoring, standort, location]
    - id: critical_findings
      label: "Kritische Compliance-Befunde"
      description: "Offene kritische oder hochschwere Befunde aus Playbook-Prüfungen."
      findings_severity: [critical, high]
    - id: sensitive_purpose
      label: "Sensibler Verarbeitungszweck"
      description: "Verarbeitung für Strafverfolgung, Finanzdienstleistungen, Sozialhilfe oder ähnliches."
      keywords_processing_context: [straf, justiz, finan, kredit, sozial, versicher, gesundheit]
    - id: innovative_technology
      label: "Neue oder innovative Technologie"
      description: "Einsatz neuer Technologien (KI, Biometrie, IoT) mit unbekannten Risiken."
      keywords_processing_context: ["ki ", "künstliche intel", biometrie, iot, "internet of things", blockchain, neu]

# -----------------------------------------------------------------------------
# DSFA-Bewertung (ISO 27005 Likelihood × Severity) — dsfa_service.generate_dsfa
# -----------------------------------------------------------------------------
dsfa_assessment:
  # Numerische Skala für Likelihood und Severity. Aktuell unterstützt: "1-5".
  scale_type: "1-5"

  # Lokalisierte Labels für die Skalenwerte (für UI-Anzeige).
  scale_labels:
    likelihood:
      1: "sehr unwahrscheinlich"
      2: "unwahrscheinlich"
      3: "möglich"
      4: "wahrscheinlich"
      5: "sehr wahrscheinlich"
    severity:
      1: "vernachlässigbar"
      2: "begrenzt"
      3: "spürbar"
      4: "erheblich"
      5: "maximal"

  # 5x5 Risk-Matrix: "{likelihood}_{severity}" -> risk_level (low|medium|high|critical).
  # Diese Matrix entspricht der gängigen ISO-27005-Klassifikation.
  matrix:
    "1_1": low
    "1_2": low
    "1_3": low
    "1_4": medium
    "1_5": medium
    "2_1": low
    "2_2": low
    "2_3": medium
    "2_4": medium
    "2_5": high
    "3_1": low
    "3_2": medium
    "3_3": medium
    "3_4": high
    "3_5": high
    "4_1": medium
    "4_2": medium
    "4_3": high
    "4_4": high
    "4_5": critical
    "5_1": medium
    "5_2": high
    "5_3": high
    "5_4": critical
    "5_5": critical

  # Bei welchem Residualrisiko-Level ist Art. 36 DSGVO Konsultation des DSB
  # zwingend? Standard: high und critical.
  dpo_consultation_required_when_residual_in: [high, critical]

  # Mindest-Konfidenz des LLM. Default 0.0 = inaktiv.
  min_confidence: 0.0

# -----------------------------------------------------------------------------
# Case-Risiko-Score — backend/app/api/routes/cases.py
# -----------------------------------------------------------------------------
case_score:
  # Strafpunkte pro Finding nach Severity-Level. Summe wird auf max_score
  # gekappt.
  severity_weights:
    critical: 30
    high: 15
    medium: 5
    low: 0
    info: 0
  max_score: 100

# -----------------------------------------------------------------------------
# Compliance-Reife-Score (Maturity) — backend/app/services/analytics_service.py
# -----------------------------------------------------------------------------
maturity:
  # Gewichtung der fünf Sub-Scores; muss sich auf 1.0 summieren.
  weights:
    vvt: 0.20
    dsfa: 0.20
    avv: 0.20
    tom: 0.20
    velocity: 0.20

  # Velocity (DSR-Antwortzeit): lineare Interpolation
  # 100 Punkte bei <= optimal_days, 0 Punkte bei >= worst_days
  velocity:
    optimal_days: 14
    worst_days: 60

# -----------------------------------------------------------------------------
# Risk-Velocity (historische Trend-Analyse) — analytics_service.compute_risk_velocity
# -----------------------------------------------------------------------------
risk_velocity:
  # Aktiviert den /analytics/risk-velocity Endpoint
  enabled: true
  # Vergleichsfenster für Trend-Berechnung (Tage)
  window_days: 90
  # Mindest-Delta in Prozentpunkten, ab dem ein Trend als signifikant gilt
  # (Pfeil hoch/runter statt "stabil"). Niedrigere Werte = sensitiver.
  significant_change_pct: 15

# -----------------------------------------------------------------------------
# Mitigation-Katalog (TOM → Risk-Reduktion) — mitigation_service.py
# -----------------------------------------------------------------------------
# Jede Mitigation kann das inherent risk einer AVV-Bewertung und/oder DSFA
# reduzieren. Die Verknüpfung zum konkreten Fall passiert über die Tabelle
# `case_mitigation_link` (Endpoints unter /cases/{id}/mitigations).
#
# applies_to:        avv | dsfa | both
# reduction:
#   AVV-seitig:
#     score_delta              negativer Float, wird auf das 1-5 Mittel addiert
#     dimension_deltas         Map Dimension → negativer Delta (vor Mittelung)
#   DSFA-seitig:
#     likelihood_delta         negativer Int, pro Risiko vor Matrix-Lookup
#     severity_delta           negativer Int, pro Risiko vor Matrix-Lookup
#     applicable_risk_keywords leere Liste = jedes Risiko; sonst Substring-Match
#
# Floors (min_likelihood, min_severity, min_avv_score) verhindern, dass eine
# Kombination das Restrisiko unter 1 / 1.0 drückt.
mitigations:
  enabled: true
  min_likelihood: 1
  min_severity: 1
  min_avv_score: 1.0
  catalog:
    - id: encryption_at_rest
      label: "Verschlüsselung ruhender Daten (AES-256)"
      description: "Datenträger- und Datenbank-Verschlüsselung gemäß BSI TR-02102."
      applies_to: both
      tom_category: confidentiality
      evidence_required: true
      reduction:
        score_delta: -0.5
        severity_delta: -1
        applicable_risk_keywords: [vertraulich, leak, leck, unbefugt, exfiltration]
    - id: encryption_in_transit
      label: "Transport-Verschlüsselung (TLS 1.2+)"
      description: "End-to-End TLS für alle Schnittstellen, HSTS aktiv."
      applies_to: both
      tom_category: confidentiality
      reduction:
        score_delta: -0.3
        dimension_deltas:
          "Drittlandrisiko": -0.3
    - id: rbac_least_privilege
      label: "Rollen- und Berechtigungskonzept (Least Privilege)"
      description: "Granulare Zugriffsrechte, regelmäßiges Recertification."
      applies_to: both
      tom_category: confidentiality
      evidence_required: true
      reduction:
        likelihood_delta: -1
        dimension_deltas:
          "Zugriffsumfang": -1.0
    - id: pseudonymization
      label: "Pseudonymisierung personenbezogener Daten"
      description: "Schlüssel getrennt gespeichert; Re-Identifikation nur mit Zusatzinfo."
      applies_to: dsfa
      tom_category: confidentiality
      reduction:
        severity_delta: -1
        applicable_risk_keywords: [identif, profil, re-identif]
    - id: data_minimization
      label: "Datenminimierung / Speicherbegrenzung"
      description: "Aufbewahrungsfristen + Löschkonzept implementiert."
      applies_to: dsfa
      tom_category: integrity
      reduction:
        likelihood_delta: -1
        severity_delta: -1
    - id: dpa_signed_eu_scc
      label: "AVV mit EU-Standardvertragsklauseln"
      description: "Aktueller AVV nach Art. 28 mit SCC bei Drittlandtransfer."
      applies_to: avv
      tom_category: organizational
      reduction:
        dimension_deltas:
          "Vertragliche Absicherung": -1.5
          "Drittlandrisiko": -0.5
    - id: audit_logging
      label: "Lückenlose Audit-Logs (manipulationssicher)"
      description: "Sicherheitsrelevante Aktionen protokolliert; WORM-Speicher."
      applies_to: both
      tom_category: integrity
      reduction:
        likelihood_delta: -1
        score_delta: -0.2
    - id: backup_dr_tested
      label: "Backup-/Wiederherstellungskonzept (regelmäßig getestet)"
      description: "Nachweisbare Restore-Tests innerhalb der letzten 12 Monate."
      applies_to: dsfa
      tom_category: availability
      evidence_required: true
      reduction:
        severity_delta: -1
        applicable_risk_keywords: [verfügbar, ausfall, verlust, ransomware]
